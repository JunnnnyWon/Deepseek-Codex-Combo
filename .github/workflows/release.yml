name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm test:integration
      - run: pnpm test:e2e
      - run: node bin/dcc.mjs install --dry-run --provider-mode=proxy
      - run: node bin/dcc.mjs install --dry-run --provider-mode=plugin-only
      - run: node bin/dcc.mjs doctor --fixture ok --home "$HOME"
